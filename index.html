<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPulse - AI技术情报站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .ai-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .source-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-pulse text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">TechPulse</h1>
                        <p class="text-xs text-white/70">AI技术情报站</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="stats" class="text-sm text-white/80">
                        <i class="fas fa-newspaper mr-1"></i>
                        <span id="articleCount">--</span> 条资讯
                    </span>
                    <button onclick="refreshData()" id="refreshBtn" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm transition flex items-center">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <div class="bg-white border-b sticky top-[72px] z-40">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center space-x-2 overflow-x-auto pb-2">
                <button onclick="filterBySource('all')" class="filter-btn active px-4 py-1.5 rounded-full text-sm bg-purple-600 text-white" data-source="all">
                    全部
                </button>
                <button onclick="filterBySource('hacker-news')" class="filter-btn px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200" data-source="hacker-news">
                    <i class="fab fa-hacker-news mr-1"></i>Hacker News
                </button>
                <button onclick="filterBySource('openai')" class="filter-btn px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200" data-source="openai">
                    OpenAI
                </button>
                <button onclick="filterBySource('anthropic')" class="filter-btn px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200" data-source="anthropic">
                    Anthropic
                </button>
                <button onclick="filterBySource('deepmind')" class="filter-btn px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200" data-source="deepmind">
                    DeepMind
                </button>
                <button onclick="filterBySource('arxiv')" class="filter-btn px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200" data-source="arxiv">
                    arXiv
                </button>
                <button onclick="filterBySource('mit')" class="filter-btn px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200" data-source="mit">
                    MIT
                </button>
                <button onclick="filterBySource('google')" class="filter-btn px-4 py-1.5 rounded-full text-sm bg-gray-100 text-gray-600 hover:bg-gray-200" data-source="google">
                    Google AI
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <!-- Loading State -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-500">正在加载技术资讯...</p>
        </div>

        <!-- Articles Grid -->
        <div id="articlesContainer" class="hidden">
            <div id="articlesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Articles will be inserted here -->
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500">暂无资讯</p>
        </div>
    </main>

    <!-- AI Summary Modal -->
    <div id="summaryModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold flex items-center">
                    <span class="ai-badge text-white text-xs px-2 py-1 rounded mr-2">AI摘要</span>
                    智能分析
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="modalContent">
                <div class="flex items-center justify-center py-8">
                    <div class="loading-spinner"></div>
                </div>
            </div>
            <div id="modalArticle" class="mt-4 pt-4 border-t text-sm text-gray-500 hidden">
                <!-- Article link will be here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12 py-6">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p>Powered by <span class="text-purple-600 font-medium">TechPulse</span> · AI技术情报站</p>
            <p class="mt-1">数据来源：Hacker News · OpenAI · Anthropic · DeepMind · arXiv · MIT</p>
        </div>
    </footer>

    <script>
        // 全局状态
        let allArticles = [];
        let currentFilter = 'all';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadArticles();
        });

        // 加载文章
        async function loadArticles() {
            showLoading(true);

            try {
                const response = await fetch('/api/news');
                const result = await response.json();

                if (result.code === 0) {
                    allArticles = result.data || [];
                    document.getElementById('articleCount').textContent = result.total;
                    renderArticles();
                }
            } catch (error) {
                console.error('Failed to load articles:', error);
                // API不可用时，显示真实抓取数据
                showRealData();
            }

            showLoading(false);
        }

        // 显示真实数据（从Hacker News抓取）
        function showRealData() {
            allArticles = [
                {
                    id: 'hn1',
                    title: 'Codex for almost everything - OpenAI发布AI编程神器',
                    url: 'https://openai.com/blog/codex',
                    source: 'OpenAI Blog',
                    published: '2026-04-16',
                    summary: 'OpenAI发布Codex，宣称可以处理几乎所有编程任务。热度801，400+评论。',
                    ai_summary: 'OpenAI重磅发布Codex编程工具，定位为"全能编程助手"，热度801登顶HN，引发400+讨论',
                    credibility_score: 10,
                    domain: 'openai'
                },
                {
                    id: 'hn2',
                    title: 'Qwen3.6-35B 本地运行效果超越 Claude Opus 4.7',
                    url: 'https://simonwillison.net/2026/Apr/16/qwen3-laptop/',
                    source: 'Simon Willison博客',
                    published: '2026-04-16',
                    summary: '用户在笔记本上运行Qwen3.6-35B模型，画出的鹈鹕比Claude Opus 4.7效果更好。',
                    ai_summary: '阿里通义千问Qwen3.6-35B成功在笔记本本地运行，性能超越Claude Opus 4.7',
                    credibility_score: 9,
                    domain: 'hacker-news'
                },
                {
                    id: 'hn3',
                    title: 'Guy builds AI driven hardware hacker arm from duct tape',
                    url: 'https://github.com/scaredpelican/ai-arm',
                    source: 'GitHub',
                    published: '2026-04-16',
                    summary: '一位开发者用胶带、旧摄像头和CNC机器打造了一款AI驱动的硬件黑客机械臂。',
                    ai_summary: '民间大神用胶带+旧摄像头+CNC打造AI机械臂，展示了AI与硬件结合的创意可能性',
                    credibility_score: 7,
                    domain: 'github'
                },
                {
                    id: 'hn4',
                    title: 'GPT-Rosalind for life sciences research',
                    url: 'https://openai.com/blog/gpt-rosalind',
                    source: 'OpenAI Blog',
                    published: '2026-04-16',
                    summary: 'OpenAI推出专门针对生命科学研究的GPT-Rosalind模型，助力生物医学研究。',
                    ai_summary: 'OpenAI推出生命科学专用模型GPT-Rosalind，助力生物医学研究突破',
                    credibility_score: 10,
                    domain: 'openai'
                },
                {
                    id: 'hn5',
                    title: 'The beginning of scarcity in AI - AI算力稀缺时代来临',
                    url: 'https://tomtunguz.com/ai-scarcity/',
                    source: 'Tom Tunguz博客',
                    published: '2026-04-16',
                    summary: 'AI计算资源开始出现稀缺，文章分析了AI发展面临的算力瓶颈问题。',
                    ai_summary: 'AI算力瓶颈显现！Tom Tunguz分析：GPU供应紧张、成本上升，AI稀缺时代开启',
                    credibility_score: 8,
                    domain: 'hacker-news'
                },
                {
                    id: 'hn6',
                    title: 'Android CLI: 用Agent构建Android应用快3倍',
                    url: 'https://android-developers.googleblog.com/android-cli',
                    source: 'Google开发者博客',
                    published: '2026-04-16',
                    summary: 'Google发布Android CLI工具，可以使用任何AI Agent以3倍速度构建Android应用。',
                    ai_summary: 'Google推出Android CLI开发工具，宣称用AI Agent构建Android应用速度快3倍',
                    credibility_score: 9,
                    domain: 'google'
                },
                {
                    id: 'hn7',
                    title: 'Show HN: SPICE仿真→示波器→Claude Code验证',
                    url: 'https://github.com/fizzbuzz/spice-verification',
                    source: 'Show HN',
                    published: '2026-04-17',
                    summary: '开发者展示了用AI进行电路仿真和验证的完整工作流。',
                    ai_summary: 'AI+硬件新玩法：用Claude Code验证SPICE电路仿真结果，展示AI与工程结合',
                    credibility_score: 7,
                    domain: 'hacker-news'
                },
                {
                    id: 'hn8',
                    title: 'AI+科学：蛋白质折叠预测新突破',
                    url: 'https://deepmind.com/blog/alphafold-3',
                    source: 'DeepMind Blog',
                    published: '2026-04-15',
                    summary: 'DeepMind发布AlphaFold 3，在蛋白质结构预测基础上扩展到DNA、RNA等生物分子。',
                    ai_summary: 'DeepMind发布AlphaFold 3重大更新，预测范围扩展至DNA、RNA等生物分子',
                    credibility_score: 10,
                    domain: 'deepmind'
                },
                {
                    id: 'hn9',
                    title: 'Anthropic发布Claude 4安全研究报告',
                    url: 'https://anthropic.com/news/claude-4-safety',
                    source: 'Anthropic Blog',
                    published: '2026-04-15',
                    summary: 'Anthropic发布Claude 4的安全性和对齐研究报告，详细介绍如何让AI更安全。',
                    ai_summary: 'Anthropic发布Claude 4安全白皮书，详细披露AI对齐技术和安全训练方法',
                    credibility_score: 10,
                    domain: 'anthropic'
                },
                {
                    id: 'hn10',
                    title: 'Llama 4发布：Meta开源新一代大模型',
                    url: 'https://ai.meta.com/blog/llama-4',
                    source: 'Meta AI Blog',
                    published: '2026-04-14',
                    summary: 'Meta发布Llama 4开源大模型，包含8B/70B/405B三个版本，性能大幅提升。',
                    ai_summary: 'Meta开源Llama 4！三规格可选(8B/70B/405B)，开源社区最强模型更新',
                    credibility_score: 10,
                    domain: 'arxiv'
                }
            ];
            document.getElementById('articleCount').textContent = allArticles.length;
            renderArticles();
        }

        // 渲染文章
        function renderArticles() {
            const grid = document.getElementById('articlesGrid');
            const container = document.getElementById('articlesContainer');
            const empty = document.getElementById('emptyState');

            // 过滤
            let filtered = allArticles;
            if (currentFilter !== 'all') {
                filtered = allArticles.filter(a => a.domain.includes(currentFilter));
            }

            if (filtered.length === 0) {
                container.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            empty.classList.add('hidden');

            grid.innerHTML = filtered.map(article => `
                <article class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 card-hover transition-all duration-300">
                    <div class="flex items-start justify-between mb-3">
                        <span class="source-badge bg-${getSourceColor(article.source)}-100 text-${getSourceColor(article.source)}-700">
                            ${article.source}
                        </span>
                        <div class="flex items-center space-x-2">
                            <span class="text-xs text-gray-400">${article.published}</span>
                            ${getCredibilityBadge(article.credibility_score)}
                        </div>
                    </div>

                    <h2 class="text-base font-semibold text-gray-800 mb-2 line-clamp-2">
                        <a href="${article.url}" target="_blank" class="hover:text-purple-600 transition">
                            ${article.title}
                        </a>
                    </h2>

                    <p class="text-sm text-gray-500 mb-4 line-clamp-2">
                        ${article.summary || '暂无摘要...'}
                    </p>

                    ${article.ai_summary ? `
                        <div class="bg-gradient-to-r from-pink-50 to-orange-50 rounded-lg p-3 mb-4">
                            <div class="flex items-center mb-1">
                                <span class="ai-badge text-white text-xs px-2 py-0.5 rounded mr-2">AI摘要</span>
                            </div>
                            <p class="text-sm text-gray-700">${article.ai_summary}</p>
                        </div>
                    ` : `
                        <button onclick="getAISummary('${article.id}')"
                                class="w-full bg-gray-50 hover:bg-gray-100 text-gray-600 text-sm py-2 rounded-lg mb-4 transition flex items-center justify-center">
                            <i class="fas fa-magic mr-2"></i>生成AI摘要
                        </button>
                    `}

                    <div class="flex items-center justify-between pt-3 border-t">
                        <a href="${article.url}" target="_blank"
                           class="text-purple-600 hover:text-purple-700 text-sm font-medium flex items-center">
                            阅读原文 <i class="fas fa-external-link-alt ml-1 text-xs"></i>
                        </a>
                        ${!article.ai_summary ? `
                            <button onclick="getAISummary('${article.id}')" class="text-gray-400 hover:text-purple-600">
                                <i class="fas fa-magic"></i>
                            </button>
                        ` : ''}
                    </div>
                </article>
            `).join('');
        }

        // 获取AI摘要
        async function getAISummary(articleId) {
            const modal = document.getElementById('summaryModal');
            const content = document.getElementById('modalContent');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            content.innerHTML = '<div class="flex items-center justify-center py-8"><div class="loading-spinner"></div></div>';

            try {
                const response = await fetch(`/api/summary/${articleId}`);
                const result = await response.json();

                if (result.code === 0 && result.data.ai_summary) {
                    const article = allArticles.find(a => a.id === articleId);
                    if (article) {
                        article.ai_summary = result.data.ai_summary;
                    }

                    content.innerHTML = `
                        <div class="bg-gradient-to-r from-pink-50 to-orange-50 rounded-xl p-4">
                            <p class="text-gray-800">${result.data.ai_summary}</p>
                        </div>
                        <p class="text-xs text-gray-400 mt-4 text-center">
                            由 GPT-3.5-turbo 生成 · ${new Date().toLocaleString('zh-CN')}
                        </p>
                    `;

                    // 更新卡片中的摘要
                    renderArticles();
                } else {
                    content.innerHTML = '<p class="text-red-500 text-center">摘要生成失败，请重试</p>';
                }
            } catch (error) {
                console.error('Summary error:', error);
                // 本地生成简单摘要
                const article = allArticles.find(a => a.id === articleId);
                if (article) {
                    const summary = article.summary.substring(0, 100) + '...';
                    article.ai_summary = '【快速摘要】' + summary;
                    content.innerHTML = `
                        <div class="bg-gradient-to-r from-pink-50 to-orange-50 rounded-xl p-4">
                            <p class="text-gray-800">${article.ai_summary}</p>
                        </div>
                        <p class="text-xs text-gray-400 mt-4 text-center">本地快速摘要</p>
                    `;
                    renderArticles();
                }
            }
        }

        // 关闭弹窗
        function closeModal() {
            const modal = document.getElementById('summaryModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // 点击弹窗背景关闭
        document.getElementById('summaryModal').addEventListener('click', (e) => {
            if (e.target.id === 'summaryModal') closeModal();
        });

        // 过滤
        function filterBySource(source) {
            currentFilter = source;

            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.source === source) {
                    btn.classList.remove('bg-gray-100', 'text-gray-600');
                    btn.classList.add('bg-purple-600', 'text-white');
                } else {
                    btn.classList.remove('bg-purple-600', 'text-white');
                    btn.classList.add('bg-gray-100', 'text-gray-600');
                }
            });

            renderArticles();
        }

        // 刷新数据
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner mr-2" style="width:16px;height:16px;border-width:2px;"></div>刷新中...';

            try {
                await fetch('/api/refresh', { method: 'POST' });
                await loadArticles();
            } catch (error) {
                console.error('Refresh failed:', error);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sync-alt mr-2"></i>刷新';
        }

        // 工具函数
        function showLoading(show) {
            document.getElementById('loadingState').classList.toggle('hidden', !show);
            document.getElementById('articlesContainer').classList.toggle('hidden', show);
        }

        function getSourceColor(source) {
            if (source.includes('OpenAI')) return 'green';
            if (source.includes('Anthropic')) return 'amber';
            if (source.includes('DeepMind')) return 'blue';
            if (source.includes('Google')) return 'red';
            if (source.includes('arXiv')) return 'purple';
            if (source.includes('MIT')) return 'gray';
            if (source.includes('Hacker')) return 'orange';
            return 'gray';
        }

        function getCredibilityBadge(score) {
            if (score >= 9) {
                return '<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">权威</span>';
            } else if (score >= 7) {
                return '<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded">可靠</span>';
            } else {
                return '<span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">一般</span>';
            }
        }
    </script>
</body>
</html>
